services:
  - type: web
    name: sandelys
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    autoDeployTrigger: commit
    healthCheckPath: /login

    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: database.db  
      - key: BACKUP_DIR
        value: backups
